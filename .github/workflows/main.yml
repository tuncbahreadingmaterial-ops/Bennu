name: Main CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            expected_os: Linux
            expected_arch: X64
          - name: Windows x64
            runner: windows-2022
            expected_os: Windows
            expected_arch: X64
          - name: macOS arm64
            runner: macos-15
            expected_os: macOS
            expected_arch: Arm64

    steps:
      - name: Check out source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0

      - name: Set up MSVC for Ninja
        if: runner.os == 'Windows'
        uses: mlocati/setup-msvc@ade6aff3df872d66c12a63dcacdddf0041cb2693 # v1.3.1
        with:
          architecture: x64

      - name: Verify runner identity
        shell: pwsh
        env:
          EXPECTED_OS: ${{ matrix.expected_os }}
          EXPECTED_ARCH: ${{ matrix.expected_arch }}
        run: |
          $actualOs = if ($IsLinux) {
            "Linux"
          } elseif ($IsWindows) {
            "Windows"
          } elseif ($IsMacOS) {
            "macOS"
          } else {
            "Unknown"
          }
          $actualArch = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString()
          Write-Host "Observed OS: $actualOs"
          Write-Host "Observed architecture: $actualArch"
          if ($actualOs -ne $env:EXPECTED_OS) {
            throw "Expected OS $env:EXPECTED_OS, observed $actualOs"
          }
          if ($actualArch -ne $env:EXPECTED_ARCH) {
            throw "Expected architecture $env:EXPECTED_ARCH, observed $actualArch"
          }

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Report build identities
        shell: pwsh
        run: |
          Write-Host "CMake-generated build identity:"
          Get-Content build/bennu-build-info.txt
          Write-Host "CMake CLI:"
          cmake --version
          if ($LASTEXITCODE -ne 0) { throw "cmake --version failed" }
          Write-Host "Ninja CLI:"
          ninja --version
          if ($LASTEXITCODE -ne 0) { throw "ninja --version failed" }

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  pr-gate:
    name: PR Gate
    if: ${{ always() }}
    needs: build-and-test
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require successful matrix and contract validation
        shell: bash
        env:
          MATRIX_RESULT: ${{ needs.build-and-test.result }}
        run: test "$MATRIX_RESULT" = "success"
